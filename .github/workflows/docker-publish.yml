name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            eduardomnzs/agronomy-api:latest
            eduardomnzs/agronomy-api:sha-${{ github.sha }}
          cache-from: type=registry,ref=eduardomnzs/agronomy-api:buildcache
          cache-to: type=registry,ref=eduardomnzs/agronomy-api:buildcache,mode=max

      - name: Trigger Portainer redeploy
        if: ${{ secrets.PORTAINER_WEBHOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
