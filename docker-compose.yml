services:
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agronomy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD em .env}
      POSTGRES_DB: ${POSTGRES_DB:-agronomy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agronomy_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agronomy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?defina REDIS_PASSWORD em .env}
      - --save
      - ""
    networks:
      - agronomy_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: ["api"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-agronomy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agronomy}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agronomy_internal
    volumes:
      - ./data:/app/data

  worker:
    build: .
    command: ["worker"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-agronomy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agronomy}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SKIP_MIGRATIONS=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agronomy_internal
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - agronomy_internal

networks:
  agronomy_internal:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
