services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agronomy
      POSTGRES_PASSWORD: agronomy
      POSTGRES_DB: agronomy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
